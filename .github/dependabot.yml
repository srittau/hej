---
version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
      time: "04:00"
    cooldown:
      default-days: 5
    groups:
      dependencies:
        exclude-patterns:
          - "mypy"
          - "types-*"
        update-types:
          - "minor"
          - "patch"
      mypy:
        patterns:
          - "mypy"
      types:
        patterns:
          - "types-*"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      time: "04:00"
    cooldown:
      default-days: 5
    groups:
      dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: github-actions
    directory: "/"
    cooldown:
      default-days: 5
    schedule:
      interval: weekly
      time: '04:00'
